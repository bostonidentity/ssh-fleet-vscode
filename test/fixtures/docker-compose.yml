# Local sshd container for smoke testing.
#
# Usage:
#   docker compose -f test/fixtures/docker-compose.yml up -d
#   npm run smoke
#   docker compose -f test/fixtures/docker-compose.yml down
#
# Connect details (matches what scripts/smoke.ts expects):
#   host:     127.0.0.1
#   port:     2222
#   user:     dev
#   password: devpass
#   key:      test/fixtures/test_key (auto-generated on first up)

services:
  sshd:
    image: linuxserver/openssh-server:latest
    container_name: ssh-fleet-smoke-sshd
    ports:
      - "2222:2222"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "UTC"
      USER_NAME: "dev"
      USER_PASSWORD: "devpass"
      PASSWORD_ACCESS: "true"
      SUDO_ACCESS: "true"
      LOG_STDOUT: "true"
    volumes:
      - ./sshd-config:/config
    restart: unless-stopped
